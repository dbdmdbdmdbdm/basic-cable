services:
  ha-screencap:
    build: .
    container_name: ha-screencap
    ports:
      - "8090:8080"
    environment:
      - HA_URL=http://homeassistant.local:8123
      # A Home Assistant long-lived access token (create one on your HA
      # profile page). Put it in a .env file next to this compose file:
      #   HA_TOKEN=eyJhbGciOi...
      - HA_TOKEN=${HA_TOKEN}
      # Dashboard path(s) as seen in your browser's URL bar. One or more,
      # comma-separated — the first serves at /latest.png, the second at
      # /latest/1.png, and so on.
      - DASH_PATHS=/lovelace/0
      - INTERVAL_SECONDS=10
      - WIDTH=1920
      - HEIGHT=1080
      - DARK_MODE=true
    shm_size: 512m
    mem_limit: 1g
    restart: unless-stopped
