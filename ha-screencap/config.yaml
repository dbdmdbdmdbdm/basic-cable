name: Basic Cable Screencap
version: "1.4.1"
slug: ha_screencap
description: Serves PNG snapshots of your dashboards for the Basic Cable app's Home Dashboard channels
url: https://github.com/dbdmdbdmdbdm/basic-cable
webui: http://[HOST]:[PORT:8080]/config
hassio_api: true
ingress: true
ingress_port: 8080
panel_icon: mdi:television-classic
panel_title: Basic Cable
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
ports:
  8080/tcp: 8090
ports_description:
  8080/tcp: Snapshot server (/latest.png, /latest/<n>.png, /healthz)
options:
  token: ""
  dash_paths: /lovelace/0
  dash_names: ""
  interval_seconds: 10
  width: 1920
  height: 1080
  dark_mode: true
  reload_minutes: 60
  ha_url: http://homeassistant:8123
  app_config_enabled: false
  cameras: ""
  weather_sensors: ""
  media_players: ""
  weather_entity: ""
  ticker_scroll: false
  ticker_entities: []
schema:
  token: password
  dash_paths: str
  dash_names: str?
  interval_seconds: int(3,300)
  width: int(480,3840)
  height: int(320,2160)
  dark_mode: bool
  reload_minutes: int(1,1440)
  ha_url: url
  app_config_enabled: bool
  cameras: str?
  weather_sensors: str?
  media_players: str?
  weather_entity: str?
  ticker_scroll: bool
  ticker_entities:
    - entity: str
      name: str?
      show_when: str?
      color: str?
      icon: str?
      display: str?
