configuration:
  token:
    name: "📸 Capture · Home Assistant access token"
    description: >-
      Long-lived access token the capture browser uses to log into Home
      Assistant (create one on your HA profile page under Security).
      Snapshots stay on your network.
  dash_paths:
    name: "📸 Capture · Dashboards to capture"
    description: >-
      Dashboard paths from your browser's URL bar, comma-separated (for
      example /lovelace/0, /dashboard-family/tv). The first serves at
      /latest.png, the second at /latest/1.png, and so on.
  dash_names:
    name: "📸 Capture · Dashboard names"
    description: >-
      Optional comma-separated names matching the dashboards above, in
      the same order (for example Home, Kitchen). With app management enabled below,
      each captured dashboard automatically becomes its own channel in
      the app under this name.
  interval_seconds:
    name: "📸 Capture · Interval (seconds)"
    description: >-
      Idle time between capture rounds. With several dashboards, each one
      refreshes roughly this interval plus a few seconds of navigation
      per extra dashboard.
  width:
    name: "📸 Capture · Width (pixels)"
  height:
    name: "📸 Capture · Height (pixels)"
  dark_mode:
    name: "📸 Capture · Dark mode"
    description: Render the dashboards with the dark color scheme.
  reload_minutes:
    name: "📸 Capture · Full reload (minutes)"
    description: >-
      How often the capture page does a full reload (single-dashboard
      mode only — multiple dashboards re-render on every pass anyway).
  ha_url:
    name: "📸 Capture · Home Assistant URL"
    description: >-
      How the capture browser reaches HA. The default
      http://homeassistant:8123 works on Home Assistant OS — only change
      it for unusual network setups.
  app_config_enabled:
    name: "📺 Basic Cable app · Manage the app from this add-on"
    description: >-
      MASTER SWITCH for everything below. Serves the 📺 options at
      /appconfig; the Basic Cable app picks them up automatically
      (through the snapshot address it already has) and they OVERRIDE
      the lists typed in the app's own settings — cameras, weather
      sensors, dashboard channels, and the ticker all managed here.
  cameras:
    name: "📺 Basic Cable app · Security cameras channel"
    description: >-
      Camera entities for the live CCTV wall (channel 951), comma-
      separated. The order here is the order in the grid — first entry
      is CAM 1.
  weather_sensors:
    name: "📺 Basic Cable app · Weather channel sensors"
    description: >-
      Comma-separated sensor entities for the weather channel's "around
      the house" readings (for example sensor.outdoor_temp,
      sensor.pool_temp).
  weather_entity:
    name: "📺 Basic Cable app · Weather forecast entity"
    description: >-
      Optional weather.* entity whose forecast replaces Open-Meteo on the
      weather channel (for example weather.home). Tip: the add-on's Web UI
      (Open Web UI button) has real entity pickers for all the 📺 fields.
  media_players:
    name: "📺 Basic Cable app · Ticker now-playing sources"
    description: >-
      Comma-separated media players the bottom ticker watches. Players playing the same
      thing (grouped speakers) collapse into one entry with a count; a
      soundbar's generic "TV" title is resolved to what the room's TV is
      actually playing.
  ticker_scroll:
    name: "📺 Basic Cable app · Ticker news-crawl scrolling"
    description: >-
      On: the left side of the ticker scrolls continuously like a classic
      news crawl. Off: it sits static and rotates between items.
  ticker_entities:
    name: "📺 Basic Cable app · Ticker extra entities"
    description: >-
      Extra items for the ticker, each optionally conditional. Fields:
      entity (required); show_when — only show while the state matches,
      e.g. open (omit to always show); name — defaults to the entity's
      friendly name; color — red, orange, yellow, green, mint, teal,
      cyan, blue, purple, pink, white, gray; icon — any SF Symbol name,
      e.g. exclamationmark.triangle.fill; display — name_state (default),
      name, or state.
