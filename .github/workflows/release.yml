name: Release to App Store Connect

# Public build-and-upload: anyone can inspect these logs to see exactly
# which commit produced each build number uploaded to App Store Connect.
# See VERIFYING.md for the full verification story.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_number:
        description: "CFBundleVersion (check ASC for the current top build first)"
        required: true

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (App Store requires the 26 SDKs)
        run: |
          ls -d /Applications/Xcode*.app
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set build number (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          /usr/bin/sed -i '' "s/CURRENT_PROJECT_VERSION: \".*\"/CURRENT_PROJECT_VERSION: \"${{ inputs.build_number }}\"/" project.yml

      - name: Generate project
        run: xcodegen generate

      - name: Write ASC API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # Import a stable signing cert instead of letting -allowProvisioningUpdates
      # mint a new Apple Development cert on every ephemeral runner (those pile up
      # until the account hits the cert cap and archiving fails with "Choose a
      # certificate to revoke"). -allowProvisioningUpdates stays: it still fetches
      # provisioning profiles and handles cloud-managed Distribution signing at
      # export, but Xcode reuses the imported cert rather than creating one.
      - name: Import signing certificate
        env:
          SIGNING_CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          SIGNING_CERT_P12_PASSWORD: ${{ secrets.SIGNING_CERT_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$SIGNING_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/signing_cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing_cert.p12" \
            -P "$SIGNING_CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm "$RUNNER_TEMP/signing_cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive + export + upload (tvOS, then iOS)
        env:
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>3CX5SB49L7</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          for PLATFORM in tvOS iOS; do
            SCHEME=TunarrTV; TYPE=appletvos
            if [ "$PLATFORM" = iOS ]; then SCHEME=TunarrTViOS; TYPE=ios; fi
            xcodebuild -project TunarrTV.xcodeproj -scheme "$SCHEME" \
              -configuration Release -destination "generic/platform=$PLATFORM" \
              -archivePath "build/$SCHEME.xcarchive" archive \
              -allowProvisioningUpdates \
              -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8 \
              -authenticationKeyID "$KEY_ID" -authenticationKeyIssuerID "$ISSUER_ID"
            xcodebuild -exportArchive -archivePath "build/$SCHEME.xcarchive" \
              -exportPath "build/Export-$PLATFORM" -exportOptionsPlist ExportOptions.plist \
              -allowProvisioningUpdates \
              -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$KEY_ID.p8 \
              -authenticationKeyID "$KEY_ID" -authenticationKeyIssuerID "$ISSUER_ID"
            # altool can exit 0 even when the upload is rejected (e.g.
            # Apple's daily upload limit) — fail the run on its own verdict.
            UPLOAD_OUT=$(xcrun altool --upload-app --type "$TYPE" \
              --file build/Export-$PLATFORM/$SCHEME.ipa \
              --apiKey "$KEY_ID" --apiIssuer "$ISSUER_ID" 2>&1) || true
            echo "$UPLOAD_OUT"
            if echo "$UPLOAD_OUT" | grep -q "UPLOAD FAILED"; then
              echo "::error::$PLATFORM upload rejected by App Store Connect"
              exit 1
            fi
          done

      - name: Log build provenance
        run: |
          echo "Uploaded commit: $GITHUB_SHA (short: $(git rev-parse --short=7 HEAD))"
          echo "Build number: $(grep CURRENT_PROJECT_VERSION project.yml)"
