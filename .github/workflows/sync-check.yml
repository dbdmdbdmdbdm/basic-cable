name: sync-check

# Guard: ha-screencap/server.js and companion/ha-screencap/server.js must stay
# byte-identical. Fail the build if they ever diverge.
on: [push, pull_request]

jobs:
  server-js-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff the two server.js copies
        run: diff ha-screencap/server.js companion/ha-screencap/server.js
