name: TunarrTV
options:
  bundleIdPrefix: com.dbdm
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "3"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "28"
    DEVELOPMENT_TEAM: 3CX5SB49L7
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  TunarrTV:
    type: application
    platform: tvOS
    sources:
      - TunarrTV/Sources
      - TunarrTV/Assets.xcassets
      - TunarrTV/Resources
    entitlements:
      path: TunarrTV/TunarrTV.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: TunarrTV/Info.plist
      properties:
        CFBundleDisplayName: Basic Cable
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Dark
        UIAppFonts:
          - VT323-Regular.ttf
          - SpaceMono-Bold.ttf
          - IBMPlexMono-Bold.ttf
          - DepartureMono-Regular.otf
          - Jersey15-Regular.ttf
          - PixelifySans.ttf
          - Doto.ttf
          - Silkscreen-Bold.ttf
          - PressStart2P-Regular.ttf
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connects to your Tunarr server on the local network to stream channels.
        NSLocationWhenInUseUsageDescription: Used to show your local forecast on the weather channel.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbdm.tunarrtv
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: App Icon & Top Shelf Image
    postBuildScripts:
      - name: Stamp git commit into Info.plist
        basedOnDependencyAnalysis: false
        script: |
          COMMIT=$(git -C "$SRCROOT" rev-parse --short=7 HEAD 2>/dev/null || echo unknown)
          if ! git -C "$SRCROOT" diff-index --quiet HEAD -- 2>/dev/null; then COMMIT="$COMMIT-dirty"; fi
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :GitCommit string $COMMIT" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitCommit $COMMIT" "$PLIST"
  TunarrTViOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - TunarrTV/Sources
      - TunarrTV/AssetsiOS.xcassets
      - TunarrTV/Resources
    entitlements:
      path: TunarrTV/TunarrTViOS.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: TunarrTV/Info-iOS.plist
      properties:
        CFBundleDisplayName: Basic Cable
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connects to your Tunarr server and discovers Chromecast devices on your local network.
        NSLocationWhenInUseUsageDescription: Used to show your local forecast on the weather channel.
        NSBonjourServices:
          - _googlecast._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dbdm.tunarrtv
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    postBuildScripts:
      - name: Stamp git commit into Info.plist
        basedOnDependencyAnalysis: false
        script: |
          COMMIT=$(git -C "$SRCROOT" rev-parse --short=7 HEAD 2>/dev/null || echo unknown)
          if ! git -C "$SRCROOT" diff-index --quiet HEAD -- 2>/dev/null; then COMMIT="$COMMIT-dirty"; fi
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :GitCommit string $COMMIT" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GitCommit $COMMIT" "$PLIST"
